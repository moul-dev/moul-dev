# Air configuration for moul-dev

root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/moul-dev/main.go"
  bin = "./tmp/main"
  delay = 1000
  exclude_dir = ["bin", "tmp", ".git", ".gemini", ".agents"]
  exclude_regex = ["_test\\.go"]
  exclude_unchanged = true
  include_ext = ["go", "toml"]
  kill_delay = "500ms"
  log = "build-errors.log"
  stop_on_error = true

[color]
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = true
